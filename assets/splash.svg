<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="2732" height="2732">
  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="12" dy="15" stdDeviation="15" flood-color="#002060" flood-opacity="0.74"/>
    </filter>
  </defs>
  
  <rect width="1024" height="1024" fill="#ffffff"/>

  <g transform="translate(512, 700)" font-family="Outfit, system-ui, sans-serif" font-weight="800" font-size="620" text-anchor="middle">
    
    <text x="180" y="50" fill="#1e40af" stroke="#1e40af" stroke-width=" 33" stroke-linejoin="round" stroke-linecap="round" filter="url(#shadow)">Z</text>
    
    <text x="-150" y="-30" fill="#3b82f6" stroke="#3b82f6" stroke-width="33" stroke-linejoin="round" stroke-linecap="round" filter="url(#shadow)">A</text>
    
  </g>
